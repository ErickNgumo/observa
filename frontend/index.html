<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Observa</title>
  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

  <header id="toolbar">
    <div class="brand" aria-label="Observa — Research. Replay. Refine.">
      <div class="brand-mark" aria-hidden="true"><span></span></div>
      <div class="brand-copy">
        <div class="logo"><span>bserva</span></div>
        <div class="tagline">Research. Replay. Refine.</div>
      </div>
    </div>

    <div class="toolbar-group playback-controls" aria-label="Replay controls">
      <button class="toolbar-btn primary-action" id="btn-play" onclick="togglePlay()"><span class="button-icon">&#9654;</span> Play</button>
      <button class="toolbar-btn" id="btn-step" onclick="stepOnce()"><span class="button-icon">&#9654;|</span> Step</button>
      <button class="toolbar-btn subtle-action" id="btn-reset" onclick="resetReplay()">&#8635; Reset</button>
    </div>

    <div class="toolbar-group replay-settings">
      <label class="control-label" for="speed-select">Speed</label>
      <select id="speed-select" onchange="updateSpeed()" aria-label="Replay speed">
      <option value="500">0.5x</option>
      <option value="200" selected>1x</option>
      <option value="100">2x</option>
      <option value="50">5x</option>
      <option value="10">10x</option>
      <option value="1">Max</option>
      </select>
      <button class="toolbar-btn active icon-label" id="btn-lines" onclick="toggleLines()">&#8862; Lines</button>
    </div>

    <div id="status-bar" aria-label="Backtest status">
      <span class="instrument-chip" id="stat-pair">EURUSD M15</span>
      <span class="status-metric"><em>Balance</em>$<span id="stat-balance">10,000.00</span></span>
      <span class="status-metric"><em>PnL</em>$<span id="stat-pnl">0.00</span></span>
      <span class="status-metric"><em>Trades</em><span id="stat-trades">0</span></span>
      <span class="replay-position" id="stat-progress">Bar 0 / 0</span>
    </div>

    <div class="theme-control">
      <label class="control-label" for="theme-select">Theme</label>
      <select id="theme-select" onchange="setTheme(this.value)" aria-label="Application theme">
        <optgroup label="Dark">
          <option value="midnight" selected>Midnight</option>
          <option value="carbon">Carbon</option>
          <option value="graphite">Graphite</option>
          <option value="navy">Navy</option>
          <option value="oled">OLED</option>
        </optgroup>
        <optgroup label="Light">
          <option value="paper">Paper</option>
          <option value="snow">Snow</option>
          <option value="studio">Studio</option>
        </optgroup>
      </select>
    </div>
  </header>

  <div id="progress-bar"><div id="progress-fill"></div></div>

  <div id="chart-container">
    <div id="chart"></div>
  </div>

  <div id="panel-resize-handle" role="separator" aria-orientation="horizontal" aria-label="Resize analysis panel" tabindex="0">
    <span></span>
  </div>

  <section id="bottom-panel" aria-label="Analysis workspace">
    <div id="panel-tabs">
      <button class="panel-tab active" onclick="showPanel('equity')">Equity Curve</button>
      <button class="panel-tab" onclick="showPanel('trades')">Trade Log</button>
      <button class="panel-tab" onclick="showPanel('metrics')">Metrics</button>
      <button id="panel-toggle" onclick="togglePanel()" aria-label="Collapse analysis panel" aria-expanded="true">&#9660;</button>
    </div>
    <div id="panel-content">
      <div id="equity-panel">
        <div id="equity-context">
          <div class="analysis-heading">
            <span class="eyebrow">Investigation view</span>
            <span class="analysis-title">Equity trajectory</span>
          </div>
          <div class="equity-tools">
            <div id="equity-inspector" aria-live="polite">
              <span>Point</span><strong>Hover curve</strong>
            </div>
            <div class="equity-legend" aria-label="Equity chart legend">
              <span><i class="legend-line balance-line"></i>Balance</span>
              <span><i class="legend-line drawdown-line"></i>Max drawdown</span>
            </div>
          </div>
        </div>
        <div id="equity-chart"></div>
      </div>

      <div id="trade-log">
        <table>
          <thead>
            <tr>
              <th>#</th><th>Direction</th><th>Entry Time</th>
              <th>Entry Price</th><th>Exit Price</th>
              <th>SL</th><th>TP</th><th>Reason</th><th>PnL</th>
            </tr>
          </thead>
          <tbody id="trade-log-body"></tbody>
        </table>
      </div>

      <div id="metrics-panel">
        <div id="metrics-grid"></div>
      </div>
    </div>
  </section>

  <!-- Order matters: state first, then everything that reads it -->
  <script src="/js/state.js"></script>
  <script src="/js/helpers.js"></script>
  <script src="/js/themes.js"></script>
  <script src="/js/charts.js"></script>
  <script src="/js/events.js"></script>
  <script src="/js/drawdown.js"></script>
  <script src="/js/playback.js"></script>
  <script src="/js/panels.js"></script>
  <script src="/js/main.js"></script>
</body>
</html>
