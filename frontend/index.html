<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Observa</title>
  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Toolbar ── */
    #toolbar {
      height: 44px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 8px;
      flex-shrink: 0;
    }

    #toolbar .logo {
      font-size: 15px;
      font-weight: 700;
      color: #58a6ff;
      margin-right: 16px;
      letter-spacing: 1px;
    }

    .toolbar-btn {
      background: #21262d;
      border: 1px solid #30363d;
      color: #e6edf3;
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      transition: background 0.15s;
    }

    .toolbar-btn:hover { background: #30363d; }
    .toolbar-btn.active { background: #1f6feb; border-color: #1f6feb; }

    .toolbar-separator {
      width: 1px;
      height: 20px;
      background: #30363d;
      margin: 0 4px;
    }

    #speed-select {
      background: #21262d;
      border: 1px solid #30363d;
      color: #e6edf3;
      padding: 5px 8px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
    }

    #status-bar {
      margin-left: auto;
      display: flex;
      gap: 16px;
      color: #8b949e;
      font-size: 12px;
    }

    #status-bar span { color: #e6edf3; }

    /* ── Chart ── */
    #chart-container {
      flex: 1;
      position: relative;
      min-height: 0;
    }

    #chart { width: 100%; height: 100%; }

    /* ── Bottom Panel ── */
    #bottom-panel {
      height: 200px;
      background: #161b22;
      border-top: 1px solid #30363d;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      transition: height 0.2s;
    }

    #bottom-panel.collapsed { height: 32px; }

    #panel-tabs {
      display: flex;
      align-items: center;
      height: 32px;
      border-bottom: 1px solid #30363d;
      padding: 0 8px;
      gap: 4px;
      flex-shrink: 0;
    }

    .panel-tab {
      background: none;
      border: none;
      color: #8b949e;
      padding: 4px 12px;
      cursor: pointer;
      border-radius: 4px;
      font-size: 12px;
    }

    .panel-tab:hover { color: #e6edf3; }
    .panel-tab.active { color: #58a6ff; }

    #panel-toggle {
      margin-left: auto;
      background: none;
      border: none;
      color: #8b949e;
      cursor: pointer;
      font-size: 16px;
      padding: 4px 8px;
    }

    #panel-content {
      flex: 1;
      overflow: hidden;
      min-height: 0;
    }

    #bottom-panel.collapsed #panel-content { display: none; }

    #equity-panel { width: 100%; height: 100%; }

    #trade-log {
      display: none;
      height: 100%;
      overflow-y: auto;
    }

    #trade-log table { width: 100%; border-collapse: collapse; }

    #trade-log th {
      background: #0d1117;
      padding: 6px 12px;
      text-align: left;
      color: #8b949e;
      font-weight: 500;
      position: sticky;
      top: 0;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    #trade-log td {
      padding: 6px 12px;
      border-bottom: 1px solid #21262d;
      color: #e6edf3;
    }

    #trade-log tr:hover td { background: #161b22; }

    .pnl-positive { color: #3fb950; }
    .pnl-negative { color: #f85149; }

    /* ── Progress Bar ── */
    #progress-bar { height: 2px; background: #21262d; flex-shrink: 0; }
    #progress-fill { height: 100%; background: #1f6feb; width: 0%; transition: width 0.1s; }
  </style>
</head>
<body>

  <div id="toolbar">
    <div class="logo">OBSERVA</div>
    <div class="toolbar-separator"></div>
    <button class="toolbar-btn" id="btn-play" onclick="togglePlay()">&#9654; Play</button>
    <button class="toolbar-btn" id="btn-step" onclick="stepOnce()">&#9654;| Step</button>
    <button class="toolbar-btn" id="btn-reset" onclick="resetReplay()">&#8635; Reset</button>
    <div class="toolbar-separator"></div>
    <label style="color:#8b949e; font-size:12px;">Speed</label>
    <select id="speed-select" onchange="updateSpeed()">
      <option value="500">0.5x</option>
      <option value="200" selected>1x</option>
      <option value="100">2x</option>
      <option value="50">5x</option>
      <option value="10">10x</option>
      <option value="1">Max</option>
    </select>
    <div class="toolbar-separator"></div>
    <button class="toolbar-btn active" id="btn-lines" onclick="toggleLines()">&#8862; Lines</button>
    <div class="toolbar-separator"></div>
    <div id="status-bar">
      <span id="stat-pair">EURUSD M15</span>
      <span>Balance: $<span id="stat-balance">10,000.00</span></span>
      <span>PnL: $<span id="stat-pnl">0.00</span></span>
      <span>Trades: <span id="stat-trades">0</span></span>
      <span id="stat-progress">Bar 0 / 0</span>
    </div>
  </div>

  <div id="progress-bar"><div id="progress-fill"></div></div>

  <div id="chart-container">
    <div id="chart"></div>
  </div>

  <div id="bottom-panel">
    <div id="panel-tabs">
      <button class="panel-tab active" onclick="showPanel('equity')">Equity Curve</button>
      <button class="panel-tab" onclick="showPanel('trades')">Trade Log</button>
      <button id="panel-toggle" onclick="togglePanel()">&#9660;</button>
    </div>
    <div id="panel-content">
      <div id="equity-panel"></div>
      <div id="trade-log">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Direction</th>
              <th>Entry Time</th>
              <th>Entry Price</th>
              <th>Exit Price</th>
              <th>SL</th>
              <th>TP</th>
              <th>Reason</th>
              <th>PnL</th>
            </tr>
          </thead>
          <tbody id="trade-log-body"></tbody>
        </table>
      </div>
    </div>
  </div>

<script>
// ══════════════════════════════════════════════
// GLOBALS
// ══════════════════════════════════════════════

var allEvents     = [];
var currentIndex  = 0;
var isPlaying     = false;
var playTimer     = null;
var playSpeed     = 200;
var showLines     = true;
var tradeCount    = 0;
var openTrade     = null;

var chart, candleSeries, fastEmaSeries, slowEmaSeries;
var equityChart, equitySeries;

var candleData   = [];
var fastEmaData  = [];
var slowEmaData  = [];
var equityData   = [];
var tradeMarkers = [];
var tradeLines   = [];

var totalBars    = 0;
var barsDrawn    = 0;

// ══════════════════════════════════════════════
// INIT CHARTS — TradingView Lightweight Charts v5
// ══════════════════════════════════════════════

function initCharts() {
  var LC = LightweightCharts;

  // ── Main chart ────────────────────────────
  chart = LC.createChart(document.getElementById('chart'), {
    layout: {
      background: { color: '#0d1117' },
      textColor: '#8b949e'
    },
    grid: {
      vertLines: { color: '#21262d' },
      horzLines: { color: '#21262d' }
    },
    crosshair: { mode: LC.CrosshairMode.Normal },
    rightPriceScale: { borderColor: '#30363d' },
    timeScale: {
      borderColor: '#30363d',
      timeVisible: true,
      secondsVisible: false
    },
    width:  document.getElementById('chart').clientWidth,
    height: document.getElementById('chart').clientHeight
  });

  // Candlestick series
  candleSeries = chart.addSeries(LC.CandlestickSeries, {
    upColor:         '#3fb950',
    downColor:       '#f85149',
    borderUpColor:   '#3fb950',
    borderDownColor: '#f85149',
    wickUpColor:     '#3fb950',
    wickDownColor:   '#f85149'
  });

  // Fast EMA
  fastEmaSeries = chart.addSeries(LC.LineSeries, {
    color:            '#58a6ff',
    lineWidth:        1,
    priceLineVisible: false,
    lastValueVisible: false
  });

  // Slow EMA
  slowEmaSeries = chart.addSeries(LC.LineSeries, {
    color:            '#f78166',
    lineWidth:        1,
    priceLineVisible: false,
    lastValueVisible: false
  });

  // ── Equity chart ──────────────────────────
  equityChart = LC.createChart(document.getElementById('equity-panel'), {
    layout: {
      background: { color: '#161b22' },
      textColor: '#8b949e'
    },
    grid: {
      vertLines: { color: '#21262d' },
      horzLines: { color: '#21262d' }
    },
    rightPriceScale: { borderColor: '#30363d' },
    timeScale: {
      borderColor: '#30363d',
      timeVisible: true,
      secondsVisible: false
    },
    width:  document.getElementById('equity-panel').clientWidth,
    height: document.getElementById('equity-panel').clientHeight
  });

  equitySeries = equityChart.addSeries(LC.LineSeries, {
    color:            '#3fb950',
    lineWidth:        2,
    priceLineVisible: false
  });

  // Resize on window resize
  window.addEventListener('resize', function() {
    chart.resize(
      document.getElementById('chart').clientWidth,
      document.getElementById('chart').clientHeight
    );
    equityChart.resize(
      document.getElementById('equity-panel').clientWidth,
      document.getElementById('equity-panel').clientHeight
    );
  });
}

// ══════════════════════════════════════════════
// LOAD EVENTS
// ══════════════════════════════════════════════

function loadEvents() {
  return fetch('/api/events')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      allEvents = data;
      totalBars = allEvents.filter(function(e) {
        return e.event_type === 'BarReceived';
      }).length;
      document.getElementById('stat-progress').textContent =
        'Bar 0 / ' + totalBars;
      console.log('Loaded ' + allEvents.length + ' events, ' + totalBars + ' bars');
    })
    .catch(function(err) {
      console.error('Failed to load events:', err);
    });
}

// ══════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════

function toUnix(iso) {
  return Math.floor(new Date(iso).getTime() / 1000);
}

function fmtNum(n, dec) {
  return Number(n).toLocaleString('en-US', {
    minimumFractionDigits: dec,
    maximumFractionDigits: dec
  });
}

// ══════════════════════════════════════════════
// EVENT HANDLERS
// ══════════════════════════════════════════════

function processEvent(ev) {
  if (ev.event_type === 'BarReceived')        { handleBar(ev); }
  else if (ev.event_type === 'PositionOpened') { handleOpened(ev); }
  else if (ev.event_type === 'PositionClosed') { handleClosed(ev); }
  else if (ev.event_type === 'PortfolioSnapshot') { handleSnapshot(ev); }
}

function handleBar(ev) {
  var t = toUnix(ev.timestamp);

  candleData.push({ time: t, open: ev.open, high: ev.high, low: ev.low, close: ev.close });
  candleSeries.setData(candleData);

  if (ev.ema_fast !== null && ev.ema_fast !== undefined) {
    fastEmaData.push({ time: t, value: ev.ema_fast });
    fastEmaSeries.setData(fastEmaData);
  }
  if (ev.ema_slow !== null && ev.ema_slow !== undefined) {
    slowEmaData.push({ time: t, value: ev.ema_slow });
    slowEmaSeries.setData(slowEmaData);
  }

  barsDrawn++;
  var pct = totalBars > 0 ? (barsDrawn / totalBars) * 100 : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('stat-progress').textContent =
    'Bar ' + barsDrawn + ' / ' + totalBars;
}

function handleOpened(ev) {
  openTrade = {
    direction:  ev.direction,
    entryPrice: ev.entry_price,
    entryTime:  toUnix(ev.timestamp),
    sl:         ev.sl,
    tp:         ev.tp
  };

  var marker = {
    time:     toUnix(ev.timestamp),
    position: ev.direction === 'Buy' ? 'belowBar' : 'aboveBar',
    color:    ev.direction === 'Buy' ? '#3fb950' : '#f85149',
    shape:    ev.direction === 'Buy' ? 'arrowUp' : 'arrowDown',
    text:     (ev.direction === 'Buy' ? 'B' : 'S') + ' @ ' + Number(ev.entry_price).toFixed(5)
  };
  tradeMarkers.push(marker);
  candleSeries.setMarkers(tradeMarkers.slice().sort(function(a, b) { return a.time - b.time; }));
}

function handleClosed(ev) {
  tradeCount++;
  var pnl = ev.pnl;

  var marker = {
    time:     toUnix(ev.timestamp),
    position: ev.direction === 'Buy' ? 'aboveBar' : 'belowBar',
    color:    pnl >= 0 ? '#3fb950' : '#f85149',
    shape:    'circle',
    text:     (pnl >= 0 ? '+' : '') + Math.round(pnl)
  };
  tradeMarkers.push(marker);
  candleSeries.setMarkers(tradeMarkers.slice().sort(function(a, b) { return a.time - b.time; }));

  // Entry to exit connecting line
  if (showLines && openTrade && candleData.length > 0) {
    var LC = LightweightCharts;
    var line = chart.addSeries(LC.LineSeries, {
      color:                  pnl >= 0 ? 'rgba(63,185,80,0.4)' : 'rgba(248,81,73,0.4)',
      lineWidth:              1,
      lineStyle:              LC.LineStyle.Dashed,
      priceLineVisible:       false,
      lastValueVisible:       false,
      crosshairMarkerVisible: false
    });
    line.setData([
      { time: openTrade.entryTime,         value: openTrade.entryPrice },
      { time: toUnix(ev.timestamp),        value: ev.exit_price }
    ]);
    tradeLines.push(line);
  }

  addTradeRow(ev, openTrade);
  document.getElementById('stat-trades').textContent = tradeCount;
  openTrade = null;
}

function handleSnapshot(ev) {
  var bal = ev.balance;
  var pnl = ev.realised_pnl;

  document.getElementById('stat-balance').textContent = fmtNum(bal, 2);

  var pnlEl = document.getElementById('stat-pnl');
  pnlEl.textContent = (pnl >= 0 ? '+' : '') + fmtNum(pnl, 2);
  pnlEl.style.color = pnl >= 0 ? '#3fb950' : '#f85149';

  if (candleData.length > 0) {
    var t = candleData[candleData.length - 1].time;
    equityData.push({ time: t, value: ev.equity });
    equitySeries.setData(equityData);
  }
}

function addTradeRow(closeEv, entry) {
  var tbody = document.getElementById('trade-log-body');
  var pnl   = closeEv.pnl;
  var row   = document.createElement('tr');

  var entryTime  = entry ? new Date(entry.entryTime * 1000).toISOString().slice(0,16).replace('T',' ') : '-';
  var entryPrice = entry ? Number(entry.entryPrice).toFixed(5) : '-';
  var sl         = (entry && entry.sl)  ? Number(entry.sl).toFixed(5)  : '-';
  var tp         = (entry && entry.tp)  ? Number(entry.tp).toFixed(5)  : '-';

  row.innerHTML =
    '<td>' + tradeCount + '</td>' +
    '<td style="color:' + (closeEv.direction === 'Buy' ? '#3fb950' : '#f85149') + '">' + closeEv.direction + '</td>' +
    '<td>' + entryTime + '</td>' +
    '<td>' + entryPrice + '</td>' +
    '<td>' + Number(closeEv.exit_price).toFixed(5) + '</td>' +
    '<td>' + sl + '</td>' +
    '<td>' + tp + '</td>' +
    '<td>' + closeEv.exit_reason + '</td>' +
    '<td class="' + (pnl >= 0 ? 'pnl-positive' : 'pnl-negative') + '">' +
      (pnl >= 0 ? '+' : '') + '$' + Number(pnl).toFixed(2) +
    '</td>';
  tbody.appendChild(row);
}

// ══════════════════════════════════════════════
// PLAYBACK
// ══════════════════════════════════════════════

function togglePlay() {
  isPlaying = !isPlaying;
  var btn = document.getElementById('btn-play');
  if (isPlaying) {
    btn.textContent = '⏸ Pause';
    btn.classList.add('active');
    startPlayback();
  } else {
    btn.textContent = '▶ Play';
    btn.classList.remove('active');
    stopPlayback();
  }
}

function startPlayback() {
  if (currentIndex >= allEvents.length) return;
  playTimer = setInterval(function() {
    if (currentIndex >= allEvents.length) {
      stopPlayback();
      document.getElementById('btn-play').textContent = '▶ Play';
      document.getElementById('btn-play').classList.remove('active');
      isPlaying = false;
      return;
    }
    processEvent(allEvents[currentIndex]);
    currentIndex++;
  }, playSpeed);
}

function stopPlayback() {
  if (playTimer) { clearInterval(playTimer); playTimer = null; }
}

function stepOnce() {
  if (isPlaying) togglePlay();
  if (currentIndex < allEvents.length) {
    processEvent(allEvents[currentIndex]);
    currentIndex++;
  }
}

function resetReplay() {
  stopPlayback();
  isPlaying    = false;
  currentIndex = 0;
  tradeCount   = 0;
  openTrade    = null;
  barsDrawn    = 0;
  candleData   = [];
  fastEmaData  = [];
  slowEmaData  = [];
  equityData   = [];
  tradeMarkers = [];

  tradeLines.forEach(function(l) { chart.removeSeries(l); });
  tradeLines = [];

  candleSeries.setData([]);
  fastEmaSeries.setData([]);
  slowEmaSeries.setData([]);
  candleSeries.setMarkers([]);
  equitySeries.setData([]);

  document.getElementById('btn-play').textContent = '▶ Play';
  document.getElementById('btn-play').classList.remove('active');
  document.getElementById('stat-balance').textContent = '10,000.00';
  document.getElementById('stat-pnl').textContent     = '0.00';
  document.getElementById('stat-trades').textContent  = '0';
  document.getElementById('progress-fill').style.width = '0%';
  document.getElementById('progress-fill').textContent = 'Bar 0 / ' + totalBars;
  document.getElementById('trade-log-body').innerHTML  = '';
}

function updateSpeed() {
  playSpeed = parseInt(document.getElementById('speed-select').value);
  if (isPlaying) { stopPlayback(); startPlayback(); }
}

function toggleLines() {
  showLines = !showLines;
  document.getElementById('btn-lines').classList.toggle('active', showLines);
}

// ══════════════════════════════════════════════
// PANEL CONTROLS
// ══════════════════════════════════════════════

function showPanel(tab) {
  document.getElementById('equity-panel').style.display = tab === 'equity' ? 'block' : 'none';
  document.getElementById('trade-log').style.display    = tab === 'trades' ? 'block' : 'none';
  var tabs = document.querySelectorAll('.panel-tab');
  tabs[0].classList.toggle('active', tab === 'equity');
  tabs[1].classList.toggle('active', tab === 'trades');
}

function togglePanel() {
  var panel   = document.getElementById('bottom-panel');
  var toggle  = document.getElementById('panel-toggle');
  var collapsed = panel.classList.toggle('collapsed');
  toggle.textContent = collapsed ? '▲' : '▼';
  setTimeout(function() {
    chart.resize(
      document.getElementById('chart').clientWidth,
      document.getElementById('chart').clientHeight
    );
    equityChart.resize(
      document.getElementById('equity-panel').clientWidth,
      document.getElementById('equity-panel').clientHeight
    );
  }, 220);
}

// ══════════════════════════════════════════════
// BOOT
// ══════════════════════════════════════════════

function boot() {
  initCharts();
  loadEvents().then(function() {
    console.log('Observa ready. Press Play to start replay.');
  });
}

boot();
</script>
</body>
</html>
